services:
  validator:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: aiafsim-validator:local
    container_name: aiafsim-validator
    ports:
      - "8001:8001"
    environment:
      - AFSIM_CLI=/opt/afsim/afsim_cli
      - VALIDATOR_TIMEOUT_SECONDS=15
      - MAX_ITERATIONS=3
      - KNOWLEDGE_FILE=data/knowledge/afsim_chunks.json
      - RAG_BACKEND=json
      - CHROMA_PERSIST_DIRECTORY=data/chroma
      - CHROMA_COLLECTION_NAME=afsim_dsl
      - CHROMA_ENABLE_BOOTSTRAP=true
      - OLLAMA_URL=http://localhost:11433/api/generate
      - OLLAMA_MODEL=hopephoto/qwen3-4b-instruct-2507_q8
      - OLLAMA_TIMEOUT_SECONDS=180
    volumes:
      # Mount offline AFSIM runtime from host.
      - ./afsim_bin:/opt/afsim:ro
      - ./data/chroma:/workspace/data/chroma
    restart: unless-stopped

  # 若使用 compose 内置 ollama，请将 OLLAMA_URL 改为 http://ollama:11434/api/generate。
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ./data/ollama:/root/.ollama
  #   restart: unless-stopped
