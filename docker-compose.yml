services:
  validator:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    image: aiafsim-validator:local
    container_name: aiafsim-validator
    ports:
      - "8001:8001"
    environment:
      - AFSIM_CLI=/opt/afsim/afsim_cli
      - VALIDATOR_TIMEOUT_SECONDS=15
      - MAX_ITERATIONS=3
      - KNOWLEDGE_FILE=data/knowledge/afsim_chunks.json
      - RAG_BACKEND=json
      - CHROMA_PERSIST_DIRECTORY=data/chroma
      - CHROMA_COLLECTION_NAME=afsim_dsl
      - CHROMA_ENABLE_BOOTSTRAP=true
      - LLM_BACKEND=mock
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen3:4b-instruct-2507
      - OLLAMA_TIMEOUT_SECONDS=60
    volumes:
      # Mount offline AFSIM runtime from host.
      - ./afsim_bin:/opt/afsim:ro
      - ./data/chroma:/workspace/data/chroma
    restart: unless-stopped

  # 后续引入时可取消注释，并将 validator 的 LLM_BACKEND 改为 ollama。
